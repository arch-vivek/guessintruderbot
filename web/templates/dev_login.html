{% extends "base.html" %} {% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <h2>Developer Login</h2>
    <p class="text-muted">Enter your Telegram user ID (only works locally).</p>
    <form method="POST">
      <div class="mb-3">
        <label>User ID</label>
        <input type="text" name="user_id" class="form-control" required />
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <hr />
    <p><a href="{{ url_for('login') }}">Use Telegram Login (production)</a></p>
  </div>
</div>
{% endblock %}
