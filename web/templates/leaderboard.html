{% extends "base.html" %} {% block content %}
<h2>🌐 Global Leaderboard</h2>
<table class="table table-hover mt-4">
  <thead>
    <tr>
      <th>#</th>
      <th>Player</th>
      <th>Level</th>
      <th>MMR</th>
    </tr>
  </thead>
  <tbody>
    {% for row in top %}
    <tr>
      <td>{{ loop.index }}</td>
      <td>{{ row['first_name'] or row['username'] or 'Unknown' }}</td>
      <td>{{ row['level'] }}</td>
      <td><span class="badge bg-warning text-dark">{{ row['mmr'] }}</span></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
